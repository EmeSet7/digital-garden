name: arr-stack
services:

 ######                                                   
 #     # #####   ####  #    # #        ##   #####  #####  
 #     # #    # #    # #    # #       #  #  #    # #    # 
 ######  #    # #    # #    # #      #    # #    # #    # 
 #       #####  #    # # ## # #      ###### #####  #####  
 #       #   #  #    # ##  ## #      #    # #   #  #   #  
 #       #    #  ####  #    # ###### #    # #    # #    #
 
   prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - D:\Docker\Prowlarr\Config:/config
      - D:\Docker\Prowlarr\Backup:/data/Backup
      - D:\Docker\Downloads:/data/downloads
    ports:
      - 9697:9696
    restart: unless-stopped
    
  #####                                     
 #     #  ####  #    #   ##   #####  #####  
 #       #    # ##   #  #  #  #    # #    # 
  #####  #    # # #  # #    # #    # #    # 
       # #    # #  # # ###### #####  #####  
 #     # #    # #   ## #    # #   #  #   #  
  #####   ####  #    # #    # #    # #    # 

   sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - D:\Docker\Sonarr\Config:/config
      - D:\Docker\Sonarr\Backup:/data/Backup
      - D:\Docker\Media\tvshows:/data/tvshows
      - D:\Docker\Downloads:/data/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

 ######                                     
 #     #   ##   #####    ##   #####  #####  
 #     #  #  #  #    #  #  #  #    # #    # 
 ######  #    # #    # #    # #    # #    # 
 #   #   ###### #    # ###### #####  #####  
 #    #  #    # #    # #    # #   #  #   #  
 #     # #    # #####  #    # #    # #    # 

   radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - D:\Docker\Radarr\Config:/config
      - D:\Docker\Radarr\Backup:/data/Backup
      - D:\Docker\Media\movies:/data/movies
      - D:\Docker\Downloads:/data/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

 ######                                     
 #     #   ##   ######   ##   #####  #####  
 #     #  #  #      #   #  #  #    # #    # 
 ######  #    #    #   #    # #    # #    # 
 #     # ######   #    ###### #####  #####  
 #     # #    #  #     #    # #   #  #   #  
 ######  #    # ###### #    # #    # #    # 

   bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - D:\Docker\Bazarr\Config:/config
      - D:\Docker\Media\movies:/movies
      - D:\Docker\Media\tvshows:/tv
    ports:
      - 6767:6767
    restart: unless-stopped

         ######                                                         
  ####  #     # # ##### #####  ####  #####  #####  ###### #    # ##### 
 #    # #     # #   #     #   #    # #    # #    # #      ##   #   #   
 #    # ######  #   #     #   #    # #    # #    # #####  # #  #   #   
 #  # # #     # #   #     #   #    # #####  #####  #      #  # #   #   
 #   #  #     # #   #     #   #    # #   #  #   #  #      #   ##   #   
  ### # ######  #   #     #    ####  #    # #    # ###### #    #   #   

   qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon 
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - D:\Docker\qBittorrent\Config:/config
      - D:\Docker\Downloads:/data/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped