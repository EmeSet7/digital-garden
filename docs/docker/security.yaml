name: security
services:
  adguardhome:
    image: adguard/adguardhome
    ports:
      - 53:53/tcp # plain dns over tcp
      - 53:53/udp # plain dns over udp
      - 80:80/tcp # http web interface
      - 3000:3000/tcp # initial setup web interface
    volumes:
      - D:\Docker\AdGuard\conf:/opt/adguardhome/conf # app configuration
      - D:\Docker\AdGuard\work:/opt/adguardhome/work # app working directory
    restart: unless-stopped