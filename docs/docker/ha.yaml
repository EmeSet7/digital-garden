name: homeassistant
services:
  homeassistant:
    image: lscr.io/linuxserver/homeassistant:latest
    container_name: homeassistant
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - D:\Docker\Homeassistant/data:/config
    ports:
      - 8123:8123 #optional
    restart: unless-stopped