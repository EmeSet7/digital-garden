name: ai
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - D:\Docker\Ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=15m  # keep model loaded for 30 min after last use

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - D:\Docker\OpenWebUI:/app/backend/data
    depends_on:
      - ollama
    environment:
      - OLLAMA_API_BASE=http://ollama:11434

volumes:
  ollama_data:
  openwebui_data: